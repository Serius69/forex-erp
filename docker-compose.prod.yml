# docker-compose.prod.yml — Producción Kapitalya ERP
# Uso: docker-compose -f docker-compose.prod.yml up -d
version: '3.9'

x-backend-env: &backend-env
  env_file:
    - ./backend/.env.production

x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile.prod
  <<: *backend-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - kapitalya

services:

  # ── Base de datos ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-forex_erp}
      POSTGRES_USER:     ${POSTGRES_USER:-forex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forex_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kapitalya

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-kapitalya_redis} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - kapitalya

  # ── Backend (Daphne ASGI — soporta WebSockets + HTTP) ────────────────────
  backend:
    <<: *backend-base
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "8000"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    <<: *backend-base
    command: celery -A core worker -l INFO -Q high,default,low --concurrency 4
    volumes:
      - media_files:/app/media
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A core inspect ping -d celery@$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3

  # ── Celery Beat (tareas programadas) ─────────────────────────────────────
  celery-beat:
    <<: *backend-base
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend/logs:/app/logs

  # ── Flower (monitoreo Celery) ─────────────────────────────────────────────
  flower:
    <<: *backend-base
    command: celery -A core flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-kapitalya2024}
    expose:
      - "5555"

  # ── Frontend (React build) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_build:/usr/share/nginx/html
    restart: unless-stopped
    networks:
      - kapitalya

  # ── Nginx (reverse proxy + SSL termination) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - frontend_build:/var/www/html:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - kapitalya

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  frontend_build:

networks:
  kapitalya:
    driver: bridge
