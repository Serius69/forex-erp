# nginx/nginx.conf — desarrollo local
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    upstream backend_api {
        server backend:8007;
        keepalive 16;
    }

    upstream backend_ws {
        server channels:8008;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers (estándar ecosistema Kapitalya) ──────
        server_tokens off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── API REST ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── Django Admin ──────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Health check ──────────────────────────────────────────
        location /health/ {
            proxy_pass http://backend_api;
            access_log off;
        }

        # ── WebSocket (Django Channels) ───────────────────────────
        location /ws/ {
            proxy_pass             http://backend_ws;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       X-Real-IP  $remote_addr;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ── Archivos estáticos Django ─────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # ── Frontend React (todo lo demás) ────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }

    # Acceso directo a la API en puerto 8007 (opcional, para dev tools)
    server {
        listen 8007;
        server_name _;

        location / {
            proxy_pass         http://backend_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
    }
}
