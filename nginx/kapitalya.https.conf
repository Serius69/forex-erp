# nginx/kapitalya.https.conf
# Production HTTPS configuration for Kapitalya ERP
# Prerequisites:
#   - SSL certificate at /etc/ssl/kapitalya/fullchain.pem
#   - SSL key at       /etc/ssl/kapitalya/privkey.pem
#   - Obtain with: certbot certonly --nginx -d yourdomain.com
#
# For Tailscale environments: use nginx.tailscale.conf (HTTP only — WireGuard encrypts at network layer)

upstream django_backend {
    server 127.0.0.1:8007;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/kapitalya/fullchain.pem;
    ssl_certificate_key /etc/ssl/kapitalya/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header X-XSS-Protection           "1; mode=block"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;

    # ── Rate limiting (pre-Django layer) ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;

    # ── Static frontend files ────────────────────────────────────────────────
    root /var/www/kapitalya/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Immutable hashed assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Auth endpoints (stricter rate limit) ─────────────────────────────────
    location ~ ^/api/auth/(login|signup|google)/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;

        # Pass cookies through (needed for httpOnly refresh token)
        proxy_pass_header  Set-Cookie;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass          http://django_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Django static/media ───────────────────────────────────────────────────
    location /static/ {
        alias   /var/www/kapitalya/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias  /var/www/kapitalya/media/;
        expires 7d;
    }

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location /health/ {
        proxy_pass http://django_backend;
        access_log off;
    }

    # Block hidden files
    location ~ /\. { deny all; }

    client_max_body_size 20M;
    keepalive_timeout    65;
    gzip                 on;
    gzip_types           text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length      1000;
}
