# nginx/nginx.tailscale.conf — Reverse proxy HTTP para red Tailscale
# Tailscale cifra el tráfico a nivel de red (WireGuard), no se necesita SSL aquí
# Acceso: http://100.x.x.x o http://hostname.tail-xxxxx.ts.net

user  nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    client_max_body_size 50M;
    types_hash_max_size 2048;

    # Gzip para assets React
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype
        image/svg+xml;

    # Rate limiting — protección básica incluso en red privada
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upstream backend (Daphne ASGI)
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Servidor principal HTTP (Tailscale) ──────────────────────────────────
    server {
        listen 80;
        server_name _;  # Acepta cualquier hostname: IP Tailscale + MagicDNS

        # Headers de seguridad básicos (sin HSTS — usamos HTTP)
        add_header X-Frame-Options        DENY        always;
        add_header X-Content-Type-Options nosniff     always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Frontend React SPA ────────────────────────────────────────────────
        location / {
            root  /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache inmutable para assets con hash (vite genera hashes)
            location ~* \.(js|css|woff2?|ttf|eot|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            # Imágenes con cache moderado
            location ~* \.(png|jpg|jpeg|gif|webp)$ {
                expires 30d;
                add_header Cache-Control "public";
                access_log off;
            }
        }

        # ── API Django REST ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Auth con rate limit estricto ─────────────────────────────────────
        location ~ ^/api/(auth|token)/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSockets (Django Channels / Daphne) ─────────────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;  # Mantener WS abierto 1h
            proxy_send_timeout  3600s;
        }

        # ── Admin Django ──────────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Archivos estáticos Django (collectstatic) ─────────────────────────
        location /static/ {
            alias   /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Archivos media (uploads) ──────────────────────────────────────────
        location /media/ {
            alias   /var/www/media/;
            expires 30d;
        }

        # ── Health check (sin log para no contaminar logs) ────────────────────
        location /health/ {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Flower — monitoreo Celery ──────────────────────────────────────────
        location /flower/ {
            proxy_pass         http://flower:5555/;
            proxy_set_header   Host $host;
            proxy_redirect     off;
        }

        # ── Bloquear acceso a archivos ocultos ────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
