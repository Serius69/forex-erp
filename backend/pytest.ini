[pytest]
DJANGO_SETTINGS_MODULE = core.settings.ci
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-omit=*/migrations/*,*/venv/*,manage.py,*/settings/*

markers =
    ml: marks tests requiring TensorFlow/Prophet (skipped in CI)
    slow: marks slow integration tests
    integration: marks tests requiring external services
