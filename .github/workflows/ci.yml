name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint (fast gate, no DB needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install lint tools
        run: pip install black==24.3.0 isort==5.13.2 flake8==7.0.0

      - name: black
        run: black --check --diff backend/

      - name: isort
        run: isort --check-only --diff backend/

      - name: flake8
        run: |
          flake8 backend/ \
            --max-line-length=88 \
            --extend-ignore=E203,W503,E501 \
            --exclude=backend/venv,backend/migrations,backend/*/migrations

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Backend tests
# ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Django Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-ci.txt

      - name: Create .env
        run: |
          cat > backend/.env << 'EOF'
          SECRET_KEY=${{ secrets.SECRET_KEY || 'ci-insecure-key-do-not-use-in-prod-1234567890' }}
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.postgresql
          DB_NAME=test_db
          DB_USER=ci_user
          DB_PASSWORD=ci_password
          DB_HOST=localhost
          DB_PORT=5432
          REDIS_URL=redis://localhost:6379/0
          CELERY_BROKER_URL=redis://localhost:6379/0
          CELERY_RESULT_BACKEND=redis://localhost:6379/1
          CHANNEL_LAYERS_HOST=localhost
          CHANNEL_LAYERS_PORT=6379
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          LARGE_TX_THRESHOLD_BOB=100000
          EOF

      - name: Django system check
        run: python backend/manage.py check
        env:
          DJANGO_SETTINGS_MODULE: core.settings.ci

      - name: Run migrations
        run: python backend/manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: core.settings.ci

      - name: Run tests with coverage
        run: |
          cd backend
          pytest -m "not ml and not slow and not integration"
        env:
          DJANGO_SETTINGS_MODULE: core.settings.ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Frontend build + type check
# ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-web

      - name: Type check
        run: npm run type-check
        working-directory: frontend-web

      - name: Build
        run: npm run build
        working-directory: frontend-web
        env:
          VITE_API_BASE_URL: /api
          VITE_WS_BASE_URL: /ws

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-web/dist/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Docker image smoke test (prod Dockerfiles)
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: kapitalya-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-web
          file: ./frontend-web/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: kapitalya-frontend:ci

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Deploy to production (main branch only, all gates must pass)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint, backend, frontend, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /app/forex-erp
            git pull origin main

            # Rebuild production images with layer cache
            docker compose -f docker-compose.prod.yml build --pull

            # Zero-downtime restart: start new, stop old
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Post-deploy tasks
            docker compose -f docker-compose.prod.yml exec -T backend \
              python manage.py migrate --noinput

            docker compose -f docker-compose.prod.yml exec -T backend \
              python manage.py collectstatic --noinput --clear

            # Verify all services healthy
            docker compose -f docker-compose.prod.yml ps

            echo "Deploy ${{ github.sha }} complete."

      - name: Notify result
        if: always()
        run: |
          echo "::notice::Deploy ${{ job.status }} — ${{ github.sha }}"
