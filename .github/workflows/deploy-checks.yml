name: Deploy Safety Checks — Kapitalya

on:
  push:
    branches: [main, master, staging]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'

jobs:
  # ── Job 1: Migraciones seguras (zero-downtime) ─────────────────────────────
  check-migrations:
    name: Verify zero-downtime migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       forex_erp_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify migrations apply cleanly
        working-directory: backend
        env:
          SECRET_KEY:    ci-secret-key-not-for-production-minimum-50-chars-xxxxxxx
          DB_NAME:       forex_erp_test
          DB_USER:       postgres
          DB_PASSWORD:   postgres
          DB_HOST:       localhost
          DB_PORT:       '5432'
          DJANGO_SETTINGS_MODULE: core.settings.ci
        run: |
          python manage.py migrate --run-syncdb
          echo "✅ Migrations applied successfully"

      - name: Verify no pending migrations after apply
        working-directory: backend
        env:
          SECRET_KEY:    ci-secret-key-not-for-production-minimum-50-chars-xxxxxxx
          DB_NAME:       forex_erp_test
          DB_USER:       postgres
          DB_PASSWORD:   postgres
          DB_HOST:       localhost
          DB_PORT:       '5432'
          DJANGO_SETTINGS_MODULE: core.settings.ci
        run: |
          python manage.py migrate --check
          echo "✅ No unapplied migrations"

  # ── Job 2: Tests de seguridad y contratos API ──────────────────────────────
  security-and-contracts:
    name: Security tests & API contracts
    runs-on: ubuntu-latest
    needs: check-migrations

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       forex_erp_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run security tests
        working-directory: backend
        env:
          SECRET_KEY:    ci-secret-key-not-for-production-minimum-50-chars-xxxxxxx
          DB_NAME:       forex_erp_test
          DB_USER:       postgres
          DB_PASSWORD:   postgres
          DB_HOST:       localhost
          DB_PORT:       '5432'
          REDIS_URL:     redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: core.settings.ci
        run: |
          python manage.py migrate --run-syncdb
          pytest core/tests/ transactions/tests/ reports/tests/ \
            -v --tb=short -x -k "not slow"
