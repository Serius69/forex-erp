# Build
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true

# React Native 0.73 — flags requeridos por app/build.gradle y el plugin RN
hermesEnabled=true
newArchEnabled=false
reactNativeArchitectures=armeabi-v7a,arm64-v8a

# Keystore — Kapitalya Release
KAPITALYA_STORE_FILE=kapitalya-release.keystore
KAPITALYA_STORE_PASSWORD=KapitalyaStore2026!
KAPITALYA_KEY_ALIAS=kapitalya
# PKCS12: la contraseña de la clave DEBE ser igual a la del store (no admite distintas)
KAPITALYA_KEY_PASSWORD=KapitalyaStore2026!