# docker-compose.tailscale.yml — Producción Kapitalya en red privada Tailscale
# Uso:
#   cp backend/.env.production.example backend/.env.production
#   # Editar .env.production con valores reales
#   docker compose -f docker-compose.tailscale.yml up -d
#
# Acceso tras despliegue: http://<TAILSCALE_IP>  (puerto 80)

# ── Bloque base reutilizable para servicios Django ────────────────────────────
x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile.prod
  env_file:
    - ./backend/.env.production
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - kapitalya

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — base de datos principal
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-forex_erp}
      POSTGRES_USER:     ${POSTGRES_USER:-kapitalya_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido en .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_backup:/backups
    # NO exponer puerto 5432 al host — solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kapitalya_user} -d ${POSTGRES_DB:-forex_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - kapitalya

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — broker Celery + cache + channels
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-kapitalya_redis_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    # NO exponer puerto 6379 al host
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-kapitalya_redis_2024}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - kapitalya

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — Django / Daphne ASGI (HTTP + WebSockets)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    <<: *backend-base
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        daphne -b 0.0.0.0 -p 8007 core.asgi:application
      "
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./backend/logs:/app/logs
    expose:
      - "8007"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8007/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Worker — procesamiento asíncrono
  # ─────────────────────────────────────────────────────────────────────────────
  celery:
    <<: *backend-base
    command: celery -A core worker -l INFO -Q high,default,low --concurrency 4
    volumes:
      - media_files:/app/media
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A core inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Beat — tareas programadas (tasas, alertas, ML)
  # ─────────────────────────────────────────────────────────────────────────────
  celery-beat:
    <<: *backend-base
    command: celery -A core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend/logs:/app/logs

  # ─────────────────────────────────────────────────────────────────────────────
  # Flower — monitoreo de Celery (accesible en /flower/)
  # ─────────────────────────────────────────────────────────────────────────────
  flower:
    <<: *backend-base
    command: >
      celery -A core flower
      --port=5555
      --url_prefix=flower
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-kapitalya2024}
    expose:
      - "5555"

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — React build (Vite) → popula volumen compartido con nginx
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: /ws
        VITE_APP_NAME: Kapitalya ERP
        VITE_APP_VERSION: "1.0.0"
    volumes:
      - frontend_build:/usr/share/nginx/html
    restart: "no"  # Solo necesita correr una vez para popular el volumen
    networks:
      - kapitalya

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx — reverse proxy principal (único puerto expuesto al exterior)
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"     # Puerto único expuesto — accesible via Tailscale IP
    volumes:
      - ./nginx/nginx.tailscale.conf:/etc/nginx/nginx.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - frontend_build:/var/www/html:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - kapitalya
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volúmenes persistentes ────────────────────────────────────────────────────
volumes:
  postgres_data:    # Datos PostgreSQL — NUNCA borrar en producción
  redis_data:       # Persistencia Redis (cache + tareas programadas)
  static_files:     # collectstatic de Django
  media_files:      # Archivos subidos por usuarios
  frontend_build:   # Build React compilado

# ── Red interna Docker ────────────────────────────────────────────────────────
networks:
  kapitalya:
    driver: bridge
